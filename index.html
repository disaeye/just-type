<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustType - Secure Notes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-color: #fafafa;
      --editor-bg: #ffffff;
      --text-color: #2d2d2d;
      --border-color: #e8e8e8;
      --muted: #999;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 14px;
      font-weight: normal;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .settings {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .setting-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .setting-group label {
      font-size: 12px;
      color: var(--muted);
    }

    select {
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--editor-bg);
      color: var(--text-color);
      cursor: pointer;
      outline: none;
    }

    select:hover {
      border-color: #ccc;
    }

    .editor-container {
      background: var(--editor-bg);
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      border: 1px solid var(--border-color);
    }

    .editor {
      width: 100%;
      min-height: 500px;
      padding: 32px;
      font-size: 18px;
      line-height: 1.8;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: var(--text-color);
      background: transparent;
      display: block;
    }

    .editor::placeholder {
      color: #ccc;
    }

    .status-bar {
      padding: 12px 24px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    .timer {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .timer-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      transition: background 0.3s;
    }

    .timer-dot.expired {
      background: #fbbf24;
    }

    .timer-dot.hidden {
      background: #e5e5e5;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .actions button {
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--editor-bg);
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.2s;
    }

    .actions button:hover {
      border-color: #999;
    }

    .actions button:active {
      background: #f0f0f0;
    }

    .info-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #2d2d2d;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .info-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .copy-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #4ade80;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .copy-indicator.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Secure Notes</h1>
      <div class="settings">
        <div class="setting-group">
          <label>Mask:</label>
          <select id="maskType">
            <option value="dot">● Dot</option>
            <option value="square">□ Square</option>
            <option value="block">■ Block</option>
            <option value="triangle">▲ Triangle</option>
            <option value="hidden">Hidden</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Duration:</label>
          <select id="duration">
            <option value="1000">1s</option>
            <option value="2000">2s</option>
            <option value="3000" selected>3s</option>
            <option value="5000">5s</option>
            <option value="10000">10s</option>
            <option value="0">Always visible</option>
          </select>
        </div>
      </div>
    </header>

    <div class="editor-container">
      <textarea 
        class="editor" 
        id="editor" 
        placeholder="Start typing your secure notes here..."
        spellcheck="false"
      ></textarea>
      <div class="status-bar">
        <div class="timer">
          <span class="timer-dot" id="timerDot"></span>
          <span id="timerText">Visible</span>
        </div>
        <div class="actions">
          <button id="copyBtn">Copy</button>
          <button id="clearBtn">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <div class="info-toast" id="toast"></div>
  <div class="copy-indicator" id="copyIndicator">Copied!</div>

  <script src="/just-type.umd.js"></script>
  <script>
    var JustType = window.JustType.JustType;

    var editor = document.getElementById('editor');
    var maskTypeSelect = document.getElementById('maskType');
    var durationSelect = document.getElementById('duration');
    var timerDot = document.getElementById('timerDot');
    var timerText = document.getElementById('timerText');
    var copyBtn = document.getElementById('copyBtn');
    var clearBtn = document.getElementById('clearBtn');
    var toast = document.getElementById('toast');
    var copyIndicator = document.getElementById('copyIndicator');

    var justType = null;
    var duration = 3000;

    function createInstance() {
      if (justType) {
        justType.destroy();
      }

      var options = {
        maskType: maskTypeSelect.value,
        duration: duration,
        onInput: function(val) {
          timerText.textContent = val ? 'Visible' : '-';
          timerDot.className = 'timer-dot';
        },
        onExpire: function() {
          timerText.textContent = 'Masked';
          timerDot.className = 'timer-dot expired';
        }
      };

      if (duration === 0) {
        options.duration = 999999999;
      }

      justType = new JustType('#editor', options);
      duration = parseInt(durationSelect.value);
    }

    maskTypeSelect.addEventListener('change', function() {
      createInstance();
      showToast('Mask: ' + maskTypeSelect.value);
    });

    durationSelect.addEventListener('change', function() {
      duration = parseInt(durationSelect.value);
      createInstance();
      if (duration === 0) {
        showToast('Always visible');
      } else {
        showToast('Duration: ' + (duration / 1000) + 's');
      }
    });

    copyBtn.addEventListener('click', function() {
      var value = justType.getValue();
      if (value) {
        navigator.clipboard.writeText(value);
        copyIndicator.classList.add('show');
        setTimeout(function() {
          copyIndicator.classList.remove('show');
        }, 1500);
      } else {
        showToast('Nothing to copy');
      }
    });

    clearBtn.addEventListener('click', function() {
      editor.value = '';
      justType.setValue('');
      timerText.textContent = '-';
      timerDot.className = 'timer-dot hidden';
      showToast('Cleared');
    });

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(function() {
        toast.classList.remove('show');
      }, 2000);
    }

    createInstance();
  </script>
</body>
</html>
